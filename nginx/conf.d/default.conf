server {
    listen 80;
    server_name savebit.ru www.savebit.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # location / {
    #     proxy_pass http://frontend:3000;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    # }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name media-panorama.ru www.media-panorama.ru;

    ssl_certificate /etc/letsencrypt/live/media-panorama.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/media-panorama.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;


    # Default: proxy root and other frontend traffic to backend
    location / {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}