server {
    listen 80;
    server_name grafana.savebit.ru www.grafana.savebit.ru;

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name grafana.savebit.ru www.grafana.savebit.ru;

    ssl_certificate /etc/letsencrypt/grafana/live/grafana.savebit.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/grafana/live/grafana.savebit.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # WebSocket — нужен для live-обновлений Grafana
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    location / {
        proxy_pass http://host.docker.internal:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90;
    }
}

